name: Build Flutter APK (auto detect)

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
      zip_path:
        required: false
        default: ""
      zip_url:
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare & Extract
        run: |
          set -e
          mkdir -p work
          cd work

          if [ -n "${{ inputs.zip_url }}" ]; then
            echo "MODE: zip_url"
            curl -L --fail "${{ inputs.zip_url }}" -o project.zip
          elif [ -n "${{ inputs.zip_path }}" ]; then
            echo "MODE: zip_path"
            cp "../${{ inputs.zip_path }}" project.zip
          else
            echo "ZIP TIDAK ADA"
            exit 1
          fi

          unzip -q project.zip -d project
          cd project

          echo "🔍 Cari pubspec.yaml..."

          if [ ! -f pubspec.yaml ]; then
            FOUND=$(find . -name pubspec.yaml | head -n 1)
            if [ -z "$FOUND" ]; then
              echo "❌ BUKAN PROJECT FLUTTER"
              exit 1
            fi
            DIR=$(dirname "$FOUND")
            echo "📂 Masuk ke: $DIR"
            cd "$DIR"
          fi

          echo "📦 Struktur:"
          ls -la

      - name: Fix Project (auto)
        run: |
          flutter doctor
          flutter clean

          # kalau android belum ada → generate
          if [ ! -d "android" ]; then
            echo "⚠️ Android folder missing, generating..."
            flutter create .
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Collect APK
        run: |
          mkdir -p out

          APK=$(find . -name "app-release.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "❌ APK NOT FOUND"
            exit 1
          fi

          cp "$APK" "out/app-${{ inputs.job_id }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: out/*.apk
